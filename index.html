<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me? ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ПАДІННЯ СЕРДЕЧОК */
        .falling-heart {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            color: rgba(255, 71, 126, 0.6);
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* РЕТРО-ВІКНО (ПЕРШИЙ ЕКРАН) */
        .window-box {
            background-color: #1a1a1a;
            border: 3px solid #ffffff;
            width: 90%;
            max-width: 360px;
            box-shadow: 8px 8px 0px #333333;
            z-index: 10;
            position: relative;
        }

        .window-header {
            border-bottom: 3px solid #ffffff;
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            background-color: #262626;
        }

        .dot {
            width: 8px;
            height: 8px;
            border: 1.5px solid #ffffff;
            background-color: transparent;
        }

        .window-content {
            padding: 30px 20px;
            text-align: center;
        }

        .question {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* КНОПКИ */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            height: 50px;
            position: relative;
        }

        .btn {
            background-color: #ffffff;
            color: #121212;
            border: 2px solid #ffffff;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            outline: none;
            height: 45px;
            min-width: 90px;
        }

        .btn:active {
            background-color: #121212;
            color: #ffffff;
        }

        #no-btn {
            position: relative;
            z-index: 15;
        }

        /* ТЕКСТ ФРАЗИ ПІСЛЯ КЛІКУ (У ЦЕНТРІ СЕРЦЯ) */
        .final-message {
            position: absolute;
            z-index: 5;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.6;
            max-width: 85%;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            display: none; /* З'явиться після кліку */
            animation: fadeInText 2s forwards;
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* КОНТЕЙНЕР ДЛЯ ВЕЛИКОГО СЕРЦЯ */
        #heart-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .heart-text-particle {
            position: absolute;
            color: #ff477e;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            animation: drawHeartParticle 0.6s forwards ease-out;
            text-shadow: 0 0 5px rgba(255, 71, 126, 0.9);
        }

        @keyframes drawHeartParticle {
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- Ретро-вікно (зникне після Yes) -->
    <div class="window-box" id="main-window">
        <div class="window-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="window-content">
            <div class="question">Do you love me?</div>
            <div class="btn-container">
                <button class="btn" id="yes-btn" onclick="selectYes()">Yes</button>
                <button class="btn" id="no-btn" onclick="moveNoButton(this)">No</button>
            </div>
        </div>
    </div>

    <!-- Текст, який з'явиться замість вікна прямо всередині серця -->
    <div class="final-message" id="love-message">
        can't believe you clicked yes! I love ya to my lil' babe
    </div>

    <!-- Контейнер для малювання великого серця -->
    <div id="heart-container"></div>

    <script>
        // Функція втечі кнопки No
        function moveNoButton(button) {
            if (button.style.position !== 'fixed') {
                button.style.position = 'fixed';
            }
            const padding = 30;
            const btnWidth = button.offsetWidth;
            const btnHeight = button.offsetHeight;

            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            button.style.left = randomX + 'px';
            button.style.top = randomY + 'px';
        }

        // Користувач натиснув YES
        function selectYes() {
            // 1. Повністю видаляємо (ховаємо) ретро-рамку
            document.getElementById('main-window').style.display = 'none';
            
            // 2. Показуємо романтичний текст по центру
            document.getElementById('love-message').style.display = 'block';
            
            // 3. Вмикаємо дощ із сердечок
            startFallingHearts();

            // 4. Запускаємо ПОВІЛЬНЕ малювання ВЕЛИКОГО серця
            setTimeout(animateTextHeart, 200);
        }

        // Фоновий дощ
        function startFallingHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerText = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 2 + 3 + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }

        // Побудова великого серця з тексту
        function animateTextHeart() {
            const container = document.getElementById('heart-container');
            const totalParticles = 90; // Більше частинок для деталізованого великого контуру
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2; 
            
            // Збільшений масштаб для великого екрана телефону (серце на весь екран)
            const scale = Math.min(window.innerWidth * 0.065, 22); 

            let i = 0;

            // Збільшено інтервал до 75мс (було 40мс) — тепер серце малюється набагато повільніше та заворожуюче
            const drawingInterval = setInterval(() => {
                if (i >= totalParticles) {
                    clearInterval(drawingInterval);
                    return;
                }

                const t = (i / totalParticles) * 2 * Math.PI;
                
                // Формула серця
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                const posX = centerX + x * scale;
                const posY = centerY + y * scale;

                const p = document.createElement('div');
                p.classList.add('heart-text-particle');
                p.innerText = 'i love ya';
                p.style.left = posX + 'px';
                p.style.top = posY + 'px';
                
                // Легкий нахил написів за формою вигину
                p.style.transform = `translate(-50%, -50%) rotate(${Math.sin(t) * 20}deg)`;

                container.appendChild(p);
                i++;
            }, 75); 
        }
    </script>
</body>
</html>
