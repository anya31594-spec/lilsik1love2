<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Do you love me? ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ПАДІННЯ СЕРДЕЧОК */
        .falling-heart {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            color: rgba(255, 71, 126, 0.6);
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* РЕТРО-ВІКНО */
        .window-box {
            background-color: #1a1a1a;
            border: 3px solid #ffffff;
            width: 90%;
            max-width: 340px;
            box-shadow: 8px 8px 0px #333333;
            z-index: 10;
            position: relative;
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 1;
        }

        .window-box.fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .window-header {
            border-bottom: 3px solid #ffffff;
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            background-color: #262626;
        }

        .dot {
            width: 8px;
            height: 8px;
            border: 1.5px solid #ffffff;
            background-color: transparent;
        }

        .window-content {
            padding: 25px 15px;
            text-align: center;
        }

        .question {
            font-size: 1.25rem;
            font-weight: bold;
            line-height: 1.5;
        }

        .question.success-text {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* КНОПКИ */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
            margin-top: 25px;
        }

        .btn {
            background-color: #ffffff;
            color: #121212;
            border: 2px solid #ffffff;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            outline: none;
            height: 45px;
            min-width: 85px;
        }

        #no-btn {
            position: relative;
            z-index: 15;
        }

        /* КОНТЕЙНЕР ДЛЯ ІДЕАЛЬНОГО СЕРЦЯ */
        #heart-container {
            position: absolute;
            width: 90vw;
            max-width: 380px;
            height: 90vw;
            max-height: 380px;
            pointer-events: none;
            z-index: 2;
            display: none;
        }

        .heart-text-particle {
            position: absolute;
            color: #ff477e;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            animation: drawHeartParticle 0.4s forwards ease-out;
            text-shadow: 0 0 4px rgba(255, 71, 126, 0.8);
        }

        @keyframes drawHeartParticle {
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- Ретро-вікно -->
    <div class="window-box" id="main-window">
        <div class="window-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="window-content">
            <div class="question" id="text-display">Do you love me?</div>
            <div class="btn-container" id="buttons-area">
                <button class="btn" id="yes-btn" onclick="selectYes()">Yes</button>
                <button class="btn" id="no-btn" onclick="moveNoButton(this)">No</button>
            </div>
        </div>
    </div>

    <!-- Контейнер для малювання великого серця -->
    <div id="heart-container"></div>

    <script>
        // Функція втечі кнопки No
        function moveNoButton(button) {
            if (button.style.position !== 'fixed') {
                button.style.position = 'fixed';
            }
            const padding = 25;
            const btnWidth = button.offsetWidth;
            const btnHeight = button.offsetHeight;

            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            button.style.left = randomX + 'px';
            button.style.top = randomY + 'px';
        }

        // Клік на YES
        function selectYes() {
            const windowText = document.getElementById('text-display');
            const buttonsArea = document.getElementById('buttons-area');
            const mainWindow = document.getElementById('main-window');

            buttonsArea.style.display = 'none';
            windowText.innerText = "can't believe you clicked yes! I love ya to my lil' babe";
            windowText.classList.add('success-text');
            
            startFallingHearts();

            // Через 3 секунди прибираємо вікно і вмикаємо серце
            setTimeout(() => {
                mainWindow.classList.add('fade-out');
                
                setTimeout(() => {
                    mainWindow.style.display = 'none';
                    document.getElementById('heart-container').style.display = 'block';
                    animateTextHeart();
                }, 600);

            }, 3000);
        }

        // Фоновий дощ
        function startFallingHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerText = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 2 + 3 + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 350);
        }

        // Абсолютно стабільна побудова контуру серця
        function animateTextHeart() {
            const container = document.getElementById('heart-container');
            const totalParticles = 40; 
            const width = container.offsetWidth;
            const height = container.offsetHeight;

            let i = 0;

            const drawingInterval = setInterval(() => {
                if (i >= totalParticles) {
                    clearInterval(drawingInterval);
                    return;
                }

                const t = (i / totalParticles) * 2 * Math.PI;
                
                // Геометрично вирівняна формула контуру, що підлаштовується під квадратний контейнер
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                // Центруємо і масштабуємо відносно блоку
                const posX = (width / 2) + (x * (width / 38));
                const posY = (height / 2.1) + (y * (height / 38));

                const p = document.createElement('div');
                p.classList.add('heart-text-particle');
                p.innerText = 'i love ya';
                p.style.left = posX + 'px';
                p.style.top = posY + 'px';
                p.style.transform = `translate(-50%, -50%) rotate(${Math.sin(t) * 30}deg)`;

                container.appendChild(p);
                i++;
            }, 90); 
        }
    </script>
</body>
</html>
